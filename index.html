<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBuilder — Visual Website Builder</title>
    <link rel="stylesheet" href="css/builder.css">
</head>
<body>

    <!-- Top Toolbar -->
    <header class="toolbar" id="toolbar">
        <div class="toolbar-left">
            <span class="app-logo">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <rect x="1" y="1" width="18" height="18" rx="3" stroke="#6c5ce7" stroke-width="2"/>
                    <rect x="5" y="5" width="4" height="4" rx="1" fill="#6c5ce7"/>
                    <rect x="11" y="5" width="4" height="4" rx="1" fill="#6c5ce7" opacity="0.5"/>
                    <rect x="5" y="11" width="10" height="4" rx="1" fill="#6c5ce7" opacity="0.3"/>
                </svg>
                WebBuilder
            </span>
            <div class="toolbar-divider"></div>
            <button id="btn-templates" class="toolbar-btn toolbar-btn-templates" title="Templates">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="1" width="6" height="6" rx="1.5"/>
                    <rect x="8" y="1" width="6" height="6" rx="1.5"/>
                    <rect x="1" y="8" width="6" height="6" rx="1.5"/>
                    <rect x="8" y="8" width="6" height="6" rx="1.5"/>
                </svg>
                <span data-i18n="templates">Templates</span>
            </button>
            <div class="toolbar-divider"></div>
            <button id="btn-undo" class="toolbar-btn" title="Undo (Ctrl+Z)" disabled>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M4.5 3L1 6.5L4.5 10V7.5H10C11.933 7.5 13.5 9.067 13.5 11C13.5 12.933 11.933 14.5 10 14.5H7V13H10C11.105 13 12 12.105 12 11C12 9.895 11.105 9 10 9H4.5V6L1 6.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button id="btn-redo" class="toolbar-btn" title="Redo (Ctrl+Y)" disabled>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="transform:scaleX(-1)">
                    <path d="M4.5 3L1 6.5L4.5 10V7.5H10C11.933 7.5 13.5 9.067 13.5 11C13.5 12.933 11.933 14.5 10 14.5H7V13H10C11.105 13 12 12.105 12 11C12 9.895 11.105 9 10 9H4.5V6L1 6.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div class="toolbar-center">
            <div class="viewport-switcher">
                <button class="viewport-btn active" data-viewport="desktop" title="Desktop">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="1" y="2" width="16" height="11" rx="1.5"/>
                        <path d="M6 16h6M9 13v3"/>
                    </svg>
                </button>
                <button class="viewport-btn" data-viewport="tablet" title="Tablet">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="1" width="12" height="16" rx="1.5"/>
                        <circle cx="9" cy="14.5" r="0.75" fill="currentColor"/>
                    </svg>
                </button>
                <button class="viewport-btn" data-viewport="mobile" title="Mobile">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="4.5" y="1" width="9" height="16" rx="1.5"/>
                        <circle cx="9" cy="14.5" r="0.75" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="toolbar-right">
            <input type="text" id="project-name" class="project-name-input"
                   value="Untitled Project" spellcheck="false">
            <div class="toolbar-divider"></div>
            <button id="btn-save" class="toolbar-btn" title="Save (Ctrl+S)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M11.5 13H2.5C1.95 13 1.5 12.55 1.5 12V2C1.5 1.45 1.95 1 2.5 1H9.5L12.5 4V12C12.5 12.55 12.05 13 11.5 13Z"/>
                    <path d="M4 1v3.5h5V1M4 13V8.5h6V13"/>
                </svg>
                <span data-i18n="save">Save</span>
            </button>
            <button id="btn-load" class="toolbar-btn" title="Load project">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M1.5 11.5V2.5C1.5 1.95 1.95 1.5 2.5 1.5H5.5L7 3.5H11.5C12.05 3.5 12.5 3.95 12.5 4.5V11.5C12.5 12.05 12.05 12.5 11.5 12.5H2.5C1.95 12.5 1.5 12.05 1.5 11.5Z"/>
                </svg>
                <span data-i18n="load">Load</span>
            </button>
            <button id="btn-preview" class="toolbar-btn" title="Preview in new tab">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M1 7s2.5-4.5 6-4.5S13 7 13 7s-2.5 4.5-6 4.5S1 7 1 7z"/>
                    <circle cx="7" cy="7" r="2"/>
                </svg>
                <span data-i18n="preview">Preview</span>
            </button>
            <button id="btn-export" class="toolbar-btn toolbar-btn-primary" title="Export HTML">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M7 1v8.5M3.5 6.5L7 10l3.5-3.5M1.5 12h11"/>
                </svg>
                <span data-i18n="export">Export</span>
            </button>
            <div class="toolbar-divider"></div>
            <!-- Language Switcher -->
            <div class="lang-switcher" id="lang-switcher">
                <button class="lang-btn" id="lang-btn" title="Language / Sprache / Idioma">
                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
                        <circle cx="7" cy="7" r="6"/>
                        <path d="M7 1c-2 2-3 3.8-3 6s1 4 3 6M7 1c2 2 3 3.8 3 6s-1 4-3 6M1 7h12"/>
                    </svg>
                    <span id="lang-current">EN</span>
                    <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" style="opacity:.6">
                        <path d="M0 2.5l4 3 4-3z"/>
                    </svg>
                </button>
                <div class="lang-dropdown" id="lang-dropdown">
                    <button class="lang-option active" data-lang="en">EN &nbsp; English</button>
                    <button class="lang-option" data-lang="de">DE &nbsp; Deutsch</button>
                    <button class="lang-option" data-lang="es">ES &nbsp; Espa&#241;ol</button>
                    <button class="lang-option" data-lang="fr">FR &nbsp; Fran&#231;ais</button>
                    <button class="lang-option" data-lang="it">IT &nbsp; Italiano</button>
                    <button class="lang-option" data-lang="pt">PT &nbsp; Portugu&#234;s</button>
                    <button class="lang-option" data-lang="zh">ZH &nbsp; &#20013;&#25991;</button>
                    <button class="lang-option" data-lang="ja">JA &nbsp; &#26085;&#26412;&#35486;</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">

        <!-- Left Panel: Component Library -->
        <aside class="panel panel-left" id="component-panel">
            <div class="panel-header">
                <span data-i18n="components">Components</span>
                <input type="text" id="component-search" class="component-search"
                       data-i18n-placeholder="searchPlaceholder"
                       placeholder="Search..." spellcheck="false">
            </div>
            <div class="panel-body" id="component-list"></div>

            <div class="panel-header panel-header-toggle" id="layer-toggle">
                <span data-i18n="layers">Layers</span>
                <svg class="toggle-arrow" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
                    <path d="M4 3l4 3-4 3z"/>
                </svg>
            </div>
            <div class="panel-body panel-body-layers" id="layer-tree" style="display:none;"></div>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-area" id="canvas-area">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <iframe id="canvas-iframe" title="Design Canvas"></iframe>
            </div>
            <div class="canvas-empty" id="canvas-empty">
                <div class="canvas-empty-icon">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.5">
                        <rect x="8" y="8" width="48" height="48" rx="6" stroke-dasharray="6 4"/>
                        <path d="M32 22v20M22 32h20" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <p data-i18n="dragToStart">Drag components here to start building</p>
                <span class="canvas-empty-hint" data-i18n="doubleClickHint">or double-click a component in the left panel</span>
            </div>
        </main>

        <!-- Right Panel: Property Editor -->
        <aside class="panel panel-right" id="property-panel">
            <div class="panel-header">
                <span data-i18n="properties">Properties</span>
            </div>
            <div class="panel-body" id="property-content">
                <div class="panel-empty">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                        <rect x="4" y="4" width="32" height="32" rx="4"/>
                        <path d="M14 16h12M14 20h8M14 24h10"/>
                    </svg>
                    <p>Select an element to edit its properties</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <span id="modal-title"></span>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/components.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/builder.js"></script>
    <script src="js/templates.js"></script>
</body>
</html>
